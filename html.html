<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronómetro</title>
    <style>
        :root {
            --bg: linear-gradient(135deg, #030303 0%, #656069 100%);
            --card: rgb(255, 254, 254);
            --text: #333;
            --display: #454855;
        }
        body.dark {
            --bg: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            --card: #1e1e2e;
            --text: #e0e0e0;
            --display: #a0a8c0;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: var(--bg);
            font-family: Arial, sans-serif;
            transition: background 0.3s;
        }
        .pantalla {
            display: none;
            background: var(--card);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            text-align: center;
            min-width: 320px;
            transition: background 0.3s;
        }
        .pantalla.activa { display: block; }
        h1 { color: var(--text); margin-top: 0; }
        p { color: var(--text); }
        .display {
            font-size: 48px;
            font-weight: bold;
            color: var(--display);
            margin: 30px 0;
            font-family: 'Courier New', monospace;
            min-height: 60px;
        }
        .buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .btn-start { background: #4CAF50; color: white; }
        .btn-start:hover { background: #45a049; transform: scale(1.05); }
        .btn-stop { background: #ff9800; color: white; }
        .btn-stop:hover { background: #e68900; transform: scale(1.05); }
        .btn-reset { background: #f44336; color: white; }
        .btn-reset:hover { background: #da190b; transform: scale(1.05); }
        .btn-nav { background: #607d8b; color: white; }
        .btn-nav:hover { background: #455a64; transform: scale(1.05); }
        .btn-menu { background: #9c27b0; color: white; font-size: 20px; padding: 20px 30px; width: 100%; margin: 8px 0; }
        .btn-menu:hover { background: #7b1fa2; transform: scale(1.02); }
        .btn-dark {
            position: fixed;
            top: 12px;
            right: 12px;
            background: #333;
            color: white;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 14px;
        }
        .btn-dark:hover { background: #555; }
        input[type="number"], input[type="time"] {
            padding: 10px;
            font-size: 18px;
            border-radius: 8px;
            border: 2px solid #ccc;
            margin: 10px 0;
            width: 80%;
            text-align: center;
            background: var(--card);
            color: var(--text);
        }
        .nav-bottom {
            margin-top: 20px;
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>

<button class="btn-dark" onclick="toggleDark()">Oscuro</button>

<!-- MENU -->
<div class="pantalla activa" id="menu">
    <h1>Reloj</h1>
    <p>Elige una opción</p>
    <div style="display:flex; flex-direction:column;">
        <button class="btn-menu" onclick="mostrar('cronometro')">Cronómetro</button>
        <button class="btn-menu" onclick="mostrar('temporizador')">Temporizador</button>
        <button class="btn-menu" onclick="mostrar('alarma')">Alarma</button>
    </div>
</div>
<!--  FIN MENU  -->>
<!-- CRONOMETRO -->
<div class="pantalla" id="cronometro">
    <h1>Cronómetro</h1>
    <div class="display" id="display">00:00:00.00</div>
    <div class="buttons">
        <button class="btn-start" id="btn-iniciar" onclick="iniciar()">Iniciar</button>
        <button class="btn-stop" id="btn-pausar" onclick="pausarReanudar()" style="display:none">Pausar</button>
        <button class="btn-reset" id="btn-reiniciar" onclick="reiniciar()" style="display:none">Reiniciar</button>
    </div>
    <div class="nav-bottom">
        <button class="btn-nav" onclick="mostrar('menu')">Menú</button>
        <button class="btn-nav" onclick="mostrar('temporizador')">Temporizador</button>
        <button class="btn-nav" onclick="mostrar('alarma')">Alarma</button>
    </div>
</div>
<script>
    let milesimas = 0, segundos = 0, minutos = 0, horas = 0;
    let intervalo = null, corriendo = false;

    function iniciar() {
        if (!corriendo) {
            corriendo = true;
            document.getElementById('btn-iniciar').style.display = 'none';
            document.getElementById('btn-pausar').style.display = 'inline-block';
            document.getElementById('btn-reiniciar').style.display = 'inline-block';
            intervalo = setInterval(() => {
                milesimas++;
                if (milesimas === 100) { milesimas = 0; segundos++; }
                if (segundos === 60) { segundos = 0; minutos++; }
                if (minutos === 60) { minutos = 0; horas++; }
                actualizar();
            }, 10);
        }
    }
    function pausarReanudar() {
        if (corriendo) {
            corriendo = false;
            clearInterval(intervalo);
            document.getElementById('btn-pausar').textContent = 'Reanudar';
        } else {
            corriendo = true;
            document.getElementById('btn-pausar').textContent = 'Pausar';
            intervalo = setInterval(() => {
                milesimas++;
                if (milesimas === 100) { milesimas = 0; segundos++; }
                if (segundos === 60) { segundos = 0; minutos++; }
                if (minutos === 60) { minutos = 0; horas++; }
                actualizar();
            }, 10);
        }
    }
    function reiniciar() {
        corriendo = false;
        clearInterval(intervalo);
        milesimas = segundos = minutos = horas = 0;
        actualizar();
        document.getElementById('btn-iniciar').style.display = 'inline-block';
        document.getElementById('btn-pausar').style.display = 'none';
        document.getElementById('btn-pausar').textContent = 'Pausar';
        document.getElementById('btn-reiniciar').style.display = 'none';
    }
    function actualizar() {
        document.getElementById('display').textContent =
            `${String(horas).padStart(2,'0')}:${String(minutos).padStart(2,'0')}:${String(segundos).padStart(2,'0')}.${String(milesimas).padStart(2,'0')}`;
    }
</script>
<!--  FIN CRONOMETRO  -->>
<!-- TEMPORIZADOR -->
<div class="pantalla" id="temporizador">
    <h1>Temporizador</h1>
    <div style="display:flex; gap:15px; justify-content:center; margin:20px 0;">
        <div style="display:flex; flex-direction:column; align-items:center;">
            <label style="color:var(--text); font-size:16px;">S</label>
            <input type="number" id="segundos-input" min="0" max="59" value="0" style="width:60px; text-align:center;">
        </div>
        <div style="display:flex; flex-direction:column; align-items:center;">
            <label style="color:var(--text); font-size:17px;">M</label>
            <input type="number" id="minutos-input" min="0" max="59" value="0" style="width:60px; text-align:center;">
        </div>
        <div style="display:flex; flex-direction:column; align-items:center;">
            <label style="color:var(--text); font-size:18px;">H</label>
            <input type="number" id="horas-input" min="0" max="99" value="0" style="width:60px; text-align:center;">
        </div>
    </div>
    <div class="display" id="display-temporizador">00:00:00</div>
    <div class="buttons">
        <button class="btn-start" id="temp-iniciar" onclick="iniciarTemporizador()">Iniciar</button>
        <button class="btn-stop" id="temp-pausar" onclick="pausarReanudarTemp()" style="display:none">Pausar</button>
        <button class="btn-reset" id="temp-reiniciar" onclick="reiniciarTemporizador()" style="display:none">Reiniciar</button>
    </div>
    <div class="nav-bottom">
        <button class="btn-nav" onclick="mostrar('menu')">Menú</button>
        <button class="btn-nav" onclick="mostrar('cronometro')">Cronómetro</button>
        <button class="btn-nav" onclick="mostrar('alarma')">Alarma</button>
    </div>
</div>

<script>
    let intervaloTemp = null;
    let corriendoTemp = false;
    let segRestantes = 0;

    function iniciarTemporizador() {
        clearInterval(intervaloTemp);
        let seg = (parseInt(document.getElementById('segundos-input').value) || 0);
        let min = (parseInt(document.getElementById('minutos-input').value) || 0) * 60;
        let hor = (parseInt(document.getElementById('horas-input').value) || 0) * 3600;
        segRestantes = seg + min + hor;
        if (segRestantes <= 0) return;
        document.getElementById('temp-iniciar').style.display = 'none';
        document.getElementById('temp-pausar').style.display = 'inline-block';
        document.getElementById('temp-reiniciar').style.display = 'inline-block';
        corriendoTemp = true;
        correrTemp();
    }
    function correrTemp() {
        intervaloTemp = setInterval(() => {
            segRestantes--;
            let h = Math.floor(segRestantes / 3600);
            let m = Math.floor((segRestantes % 3600) / 60);
            let s = segRestantes % 60;
            document.getElementById('display-temporizador').textContent =
                `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            if (segRestantes <= 0) {
                clearInterval(intervaloTemp);
                corriendoTemp = false;
                sonar();
                alert('TIEMPO');
                reiniciarTemporizador();
            }
        }, 1000);
    }
    function pausarReanudarTemp() {
        if (corriendoTemp) {
            corriendoTemp = false;
            clearInterval(intervaloTemp);
            document.getElementById('temp-pausar').textContent = 'Reanudar';
        } else {
            corriendoTemp = true;
            document.getElementById('temp-pausar').textContent = 'Pausar';
            correrTemp();
        }
    }
    function reiniciarTemporizador() {
        clearInterval(intervaloTemp);
        corriendoTemp = false;
        segRestantes = 0;
        document.getElementById('display-temporizador').textContent = '00:00:00';
        document.getElementById('segundos-input').value = '0';
        document.getElementById('minutos-input').value = '0';
        document.getElementById('horas-input').value = '0';
        document.getElementById('temp-iniciar').style.display = 'inline-block';
        document.getElementById('temp-pausar').style.display = 'none';
        document.getElementById('temp-pausar').textContent = 'Pausar';
        document.getElementById('temp-reiniciar').style.display = 'none';
    }
</script>
<!--- FIN TEMPORIZADOR  -->>
<!-- ALARMA -->
<!-- ALARMA -->
<div class="pantalla" id="alarma">
    <h1>Alarma</h1>
    <input type="time" id="hora-alarma">
    <br>
    <div class="display" id="estado-alarma">--:--</div>
    <div class="buttons">
        <button class="btn-start" onclick="ponerAlarma()">Activar</button>
        <button class="btn-reset" onclick="cancelarAlarma()">Cancelar</button>
    </div>
    <button class="btn-parar-sonido" id="parar-alarma" onclick="pararSonido()">🔇 Parar sonido</button>
    <div class="nav-bottom">
        <button class="btn-nav" onclick="mostrar('menu')">Menú</button>
        <button class="btn-nav" onclick="mostrar('cronometro')">Cronómetro</button>
        <button class="btn-nav" onclick="mostrar('temporizador')">Temporizador</button>
    </div>
</div>

<script>
    let intervaloAlarma = null;
    let audioCtx = null;
    let oscActivo = null;
    let sonandoLoop = false;

    function sonarLoop() {
        if (sonandoLoop) return;
        sonandoLoop = true;
        document.getElementById('parar-alarma').style.display = 'inline-block';
        function unCiclo() {
            if (!sonandoLoop) return;
            audioCtx = new AudioContext();
            oscActivo = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            oscActivo.connect(gain);
            gain.connect(audioCtx.destination);
            oscActivo.frequency.value = 880;
            gain.gain.setValueAtTime(1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.5);
            oscActivo.start();
            oscActivo.stop(audioCtx.currentTime + 1.5);
            oscActivo.onended = () => { if (sonandoLoop) setTimeout(unCiclo, 300); };
        }
        unCiclo();
    }

    function pararSonido() {
        sonandoLoop = false;
        if (oscActivo) { try { oscActivo.stop(); } catch(e) {} }
        if (audioCtx) { audioCtx.close(); audioCtx = null; }
        document.getElementById('parar-alarma').style.display = 'none';
    }

    function ponerAlarma() {
        audioCtx = new AudioContext();
        let horaAlarma = document.getElementById('hora-alarma').value;
        if (!horaAlarma) return;
        document.getElementById('estado-alarma').textContent = 'ALARMA ' + horaAlarma;
        intervaloAlarma = setInterval(() => {
            let ahora = new Date();
            let horaActual = `${String(ahora.getHours()).padStart(2,'0')}:${String(ahora.getMinutes()).padStart(2,'0')}`;
            if (horaActual === horaAlarma) {
                clearInterval(intervaloAlarma);
                sonarLoop();
                cancelarAlarma();
            }
        }, 1000);
    }

    function cancelarAlarma() {
        clearInterval(intervaloAlarma);
        document.getElementById('hora-alarma').value = '';
        document.getElementById('estado-alarma').textContent = '--:--';
    }
</script>
<!--  FIN ALARMA  -->
<script>
    // NAVEGACION Y DARK
    function mostrar(id) {
        document.querySelectorAll('.pantalla').forEach(p => p.classList.remove('activa'));
        document.getElementById(id).classList.add('activa');
    }
    function toggleDark() {
        document.body.classList.toggle('dark');
        const btn = document.querySelector('.btn-dark');
        btn.textContent = document.body.classList.contains('dark') ? 'Claro' : 'Oscuro';
    }

    // SONIDO
    function sonar() {
        let ctx = new AudioContext();
        let osc = ctx.createOscillator();
        let gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 880;
        gain.gain.setValueAtTime(1, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 2);
        osc.start();
        osc.stop(ctx.currentTime + 2);
    }
</script>
</body>
</html>
